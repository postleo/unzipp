# Example: one-off / on-demand extraction of .zip files already in your repo.
#
# Copy this file into `.github/workflows/` of your own repository, commit it,
# then run it from the Actions tab:
#   Actions -> Unzip Archives -> Run workflow -> pick a branch -> Run workflow
#
# Tip: for continuous, hands-off extraction instead of manual runs, replace the
# `workflow_dispatch` trigger below with:
#   on:
#     push:
#       paths: ["**/*.zip"]
name: Unzip Archives

on:
  workflow_dispatch:
    inputs:
      pattern:
        description: "Glob for the archives to extract"
        required: false
        default: "**/*.zip"
      delete-zip:
        description: "Delete each .zip after it is extracted"
        type: boolean
        default: true
      commit:
        description: "Commit the extracted files back to the branch"
        type: boolean
        default: true

permissions:
  contents: write # required so the action can commit extracted files back

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip archives
        id: unzip
        uses: postleo/unzipp@v1
        with:
          pattern: ${{ inputs.pattern }}
          delete-zip: ${{ inputs.delete-zip }}
          commit: ${{ inputs.commit }}
          commit-message: "chore: unzip archives [skip ci]"

      - name: Summary
        run: echo "Extracted ${{ steps.unzip.outputs.extracted-count }} archive(s)."

# Keeps the floating major tag (e.g. v1) in sync with the latest release tag.
#
# When you push a semver tag like v1.2.3, this workflow force-updates the
# matching major tag (v1) to point at the same commit. Consumers pinning
# `postleo/unzipp@v1` then automatically receive patches and minor updates.
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  sync-major-tag:
    name: Sync floating major tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update floating major tag
        run: |
          set -euo pipefail
          full_tag="${GITHUB_REF_NAME}"     # e.g. v1.2.3
          major_tag="${full_tag%%.*}"       # e.g. v1

          echo "Release tag : $full_tag"
          echo "Major tag   : $major_tag"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Point the major tag at this release commit and push it.
          git tag -f "$major_tag" "$full_tag"
          git push origin "refs/tags/$major_tag" --force

          echo "Updated '$major_tag' -> '$full_tag'."

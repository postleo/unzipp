name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-test:
    name: Self-test the action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create a sample archive
        run: |
          mkdir -p sample/nested
          echo "hello world" > sample/hello.txt
          echo "nested file" > sample/nested/data.txt
          (cd sample && zip -r ../fixture.zip .)
          rm -rf sample
          ls -la

      - name: Run unzip action (extract alongside)
        id: unzip
        uses: ./
        with:
          pattern: "*.zip"
          destination: "extracted"

      - name: Verify outputs and extracted contents
        run: |
          echo "extracted-count = ${{ steps.unzip.outputs.extracted-count }}"
          echo "output-paths    = ${{ steps.unzip.outputs.output-paths }}"
          test "${{ steps.unzip.outputs.extracted-count }}" = "1"
          test -f extracted/fixture/hello.txt
          test -f extracted/fixture/nested/data.txt
          echo "Self-test passed."

      - name: Create an archive with a wrapper folder
        run: |
          mkdir -p wrapped/release-v2/sub
          echo "app" > wrapped/release-v2/app.js
          echo "deep" > wrapped/release-v2/sub/deep.txt
          (cd wrapped && zip -r ../wrapped.zip release-v2)
          rm -rf wrapped

      - name: Run unzip action (strip the wrapper folder into root)
        uses: ./
        with:
          pattern: "wrapped.zip"
          destination: "stripped"
          flatten: "true"
          strip-components: "1"

      - name: Verify strip-components dropped the wrapper folder
        run: |
          test -f stripped/app.js
          test -f stripped/sub/deep.txt
          test ! -e stripped/release-v2
          echo "strip-components self-test passed."

  shellcheck:
    name: Lint shell script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: shellcheck scripts/unzip.sh
